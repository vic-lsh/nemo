name: Reusable Format Check

on:
  workflow_call:

jobs:
  format:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14

      - name: Check C/C++ code formatting
        run: ./scripts/format.sh -d
